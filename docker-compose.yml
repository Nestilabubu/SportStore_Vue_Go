version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sportshop_db
    environment:
      POSTGRES_USER: sportuser
      POSTGRES_PASSWORD: sportpass
      POSTGRES_DB: sportshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportuser -d sportshop"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sportshop_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: sportuser
      DB_PASSWORD: sportpass
      DB_NAME: sportshop
      SESSION_KEY: "supersecretkey123" # для подписи cookie
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sportshop_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8080/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
